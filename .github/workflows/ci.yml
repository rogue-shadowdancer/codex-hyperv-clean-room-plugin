name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gate2-runtime:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Prepare pinned ABI-isolated test Python
        shell: powershell
        run: ./scripts/prepare-test-python.ps1 -PythonCommand python
      - name: Validate complete Gate 2 baseline
        shell: powershell
        run: ./scripts/validate-gate2.ps1
