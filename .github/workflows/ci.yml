name: public-release-validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  public-release-validation:
    name: public-release-validation
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Prepare pinned ABI-isolated test Python
        shell: powershell
        run: ./scripts/prepare-test-python.ps1 -PythonCommand python
      - name: Validate release documentation
        shell: powershell
        run: ./scripts/validate-docs.ps1
      - name: Validate publication-hygiene policy regressions
        shell: powershell
        run: python -S ./tests/publication_hygiene_policy_tests.py
      - name: Validate publication-sensitive source and history
        shell: powershell
        run: python -S ./tests/publication_hygiene_tests.py
      - name: Validate GPL and public-release contract
        shell: powershell
        run: python -S ./tests/public_release_contract_tests.py
      - name: Validate CI-safe Gate 4 baseline
        shell: powershell
        run: ./scripts/validate-gate4-ci.ps1
