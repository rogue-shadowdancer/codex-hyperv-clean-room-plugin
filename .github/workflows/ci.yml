name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gate1-contract:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate plugin scaffold and frozen contract
        shell: powershell
        run: ./scripts/validate-gate1.ps1 -MarketplacePath ./tests/fixtures/marketplace.json
      - name: Test frozen API boundary
        shell: powershell
        run: ./tests/gate1-contract.tests.ps1
      - name: Validate Draft 2020-12 schemas and fixtures
        shell: powershell
        run: |
          python -m pip install "jsonschema>=4.23,<5"
          python ./tests/schema_contract_tests.py
